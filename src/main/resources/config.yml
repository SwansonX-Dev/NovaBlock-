# NovaBlock config
# Use /obadmin reload after editing.

# Dedicated world used for all newly-created OneBlock islands.
islandWorld: oneblock

# Nether OneBlock world. Created at startup if netherEnabled is true.
netherIslandWorld: oneblock_nether
# Toggle the entire Nether dimension. When false: /ob home nether is rejected,
# the world is not created, and existing Nether progress is preserved but inert.
netherEnabled: true

# At startup, unload the vanilla Nether and End worlds (if present) so the
# server is OneBlock-only. Players in those worlds are evacuated to /spawn
# before the unload. Set false to keep them around for admin use.
unloadVanillaDimensions: true
vanillaNetherWorld: world_nether
vanillaEndWorld: world_the_end

# Backpack auto-grab default. This is the starting state for NEW players (and
# for existing players whose saved data has no backpack toggle yet). Players
# can always flip their own state with /bp toggle. Set true to opt everyone in
# by default; false leaves new players with auto-grab off until they enable it.
backpack:
  default-auto-grab: false

# Distance in blocks between island slots in the OneBlock world.
# Default keeps islands well-separated to avoid TNT/projectile crossover.
slotSize: 256

# Disable any vanilla mob spawning in the OneBlock world (recommended true).
disableNaturalSpawning: true

# Whether to keep inventory on death inside the OneBlock world.
keepInventoryOnDeath: true

# Cooldowns in blocks broken
cooldowns:
  bossMinBlocks: 300
  lootRoomMinBlocks: 400
  # Same rhythm as the Overworld for now — tune to taste.
  netherBossMinBlocks: 300
  netherLootRoomMinBlocks: 400

# Anti auto-mine check. A player who STANDS STILL and mines their OneBlock
# non-stop for challenge-interval-seconds is shown a GUI and must click the
# green wool to prove a human is present; failing (timeout, wrong click, or
# closing the GUI) warps them to spawn. This targets AFK auto-mining only:
#  - a player who isn't mining (just AFK) never arms the check, and
#  - a player who's actually playing moves around, which resets the clock.
anti-afk:
  enabled: true
  # How long of non-stop, stationary mining before a check is issued.
  challenge-interval-seconds: 1800
  # How long the player has to click the green wool before it fails.
  challenge-timeout-seconds: 30
  # A mining gap longer than this ends the session (clock resets).
  active-window-seconds: 30
  # Moving more than this many blocks from the mining spot resets the clock —
  # so normal play (walking around while mining) is never flagged.
  move-threshold-blocks: 1.5

# Endless island questline. Every island shares one ever-advancing chain of
# objectives (break blocks, defeat bosses, clear loot rooms, fulfil prophecies).
# Clearing a stage pays scaling coins into the island bank; every Nth "milestone"
# stage adds a bonus and runs the reward commands below.
questline:
  # Reward = coins-base + (stage * coins-per-stage), plus the milestone bonus on
  # milestone stages.
  coins-base: 750
  coins-per-stage: 250
  milestone-interval: 10
  milestone-bonus-coins: 5000
  # Console commands run for each ONLINE island member when a milestone stage is
  # cleared. Placeholders: %player% (member name), %stage% (stage number).
  # Empty by default (coins-only milestones). Example:
  #   milestone-commands:
  #     - "crate give %player% questline 1"
  #     - "broadcast %player%'s island reached questline stage %stage%!"
  milestone-commands: []

# Claim block earning for xGuard. Rewards are tracked per player and paid in
# batches so we don't dispatch a command on every OneBlock break.
claim-block-rewards:
  enabled: true
  include-personal-oneblock: true
  include-community-oneblock: true
  # Default is effectively 1 claim block earned per OneBlock broken.
  every-oneblock-breaks: 100
  claim-blocks-per-reward: 100
  command: "claimblocks give %player% %amount%"
  actionbar: true

# Community Hub — shared OneBlock at /warp community, weekly server-wide goal,
# periodic raids, and co-op visit polish. Disable any sub-section independently.
community:
  enabled: true
  # Operators can live-check or reload these settings with /obadmin hub status and /obadmin hub reload.

  world:
    name: community_oneblock
    platform-size: 10
    spawn: { x: 0, y: 80, z: 0 }

  hub:
    # Exact community block location. Use /obadmin hub setblock in any world to update this.
    location:
      world: world
      x: 0
      y: 64
      z: 0
    # Legacy fallback if location.world is removed: offset from /warp spawn.
    offset: { x: 0, y: 0, z: 5 }

  oneblocks:
    # Community phases intentionally take much longer than personal islands.
    phase-required-multiplier: 10.0
    positions:
      - { x: 0, y: 81, z: 0 }
      - { x: 2, y: 81, z: 0 }
      - { x: -2, y: 81, z: 0 }
      - { x: 0, y: 81, z: 2 }
      - { x: 0, y: 81, z: -2 }

  block:
    # Drops still go 100% to the breaker. This is on TOP, into the shared pool.
    coin-tax-fraction: 0.20
    bonus-coins-per-break: 1
    payout:
      # First trigger to fire wins.
      block-threshold: 500
      interval-minutes: 60
      min-contribution-coins: 25
    broadcast:
      every-nth-break: 500
      phase-advance: true

  # Personal OneBlock resource nodes — placed on a player's own claim with the
  # Personal OneBlock grant item (/obadmin giveoneblock) when they already have an
  # island. Each is a single regenerating block that drops resources + coins when
  # mined. Admins (novablock.admin) bypass the limit.
  personal-oneblock:
    limit: 3
    coins-per-break: 2
    # Surplus stack size dropped per break (random between min and max, inclusive),
    # so players build up a stock of the node's resource quickly. Set both to 1 for
    # vanilla single-drop behaviour. Block pools per type are editable in-game with
    # /obadmin nodepool (persisted to node-pools.yml).
    drops-min: 2
    drops-max: 4

  # Auto-sell: players opt in with /ob autosell. While mining the Community OneBlock,
  # drops with a price below are converted straight to coins (compresses inventory).
  # `default: -1` means "items not listed are NOT sold" — so anything unpriced (diamonds,
  # netherite, beacons, …) still reaches the player. Set default to >= 0 to blanket-sell.
  # Prices are coins per item, and apply AFTER paxel auto-smelt (raw ore -> ingot, etc.).
  autosell:
    enabled: true
    default: -1
    prices:
      # stones / earth
      STONE: 1
      COBBLESTONE: 1
      DEEPSLATE: 1
      COBBLED_DEEPSLATE: 1
      ANDESITE: 1
      DIORITE: 1
      GRANITE: 1
      TUFF: 1
      CALCITE: 1
      DRIPSTONE_BLOCK: 1
      BASALT: 1
      BLACKSTONE: 1
      NETHERRACK: 1
      END_STONE: 1
      DIRT: 1
      GRASS_BLOCK: 1
      COARSE_DIRT: 1
      PODZOL: 1
      MYCELIUM: 1
      ROOTED_DIRT: 1
      MUD: 1
      CLAY_BALL: 1
      MOSS_BLOCK: 2
      # sands / gravel / snow
      SAND: 1
      RED_SAND: 1
      GRAVEL: 1
      FLINT: 1
      SOUL_SAND: 1
      SOUL_SOIL: 1
      SNOWBALL: 1
      ICE: 1
      PACKED_ICE: 2
      # logs
      OAK_LOG: 2
      BIRCH_LOG: 2
      SPRUCE_LOG: 2
      JUNGLE_LOG: 2
      ACACIA_LOG: 2
      DARK_OAK_LOG: 2
      MANGROVE_LOG: 2
      CHERRY_LOG: 2
      PALE_OAK_LOG: 2
      CRIMSON_STEM: 2
      WARPED_STEM: 2
      BAMBOO: 1
      # smelted ore products (paxel auto-smelt feeds these)
      COAL: 2
      RAW_IRON: 4
      IRON_INGOT: 8
      RAW_COPPER: 2
      COPPER_INGOT: 3
      RAW_GOLD: 6
      GOLD_INGOT: 10
      REDSTONE: 2
      LAPIS_LAZULI: 3
      QUARTZ: 2
      GLOWSTONE_DUST: 2
      # building blocks / misc
      SANDSTONE: 1
      RED_SANDSTONE: 1
      SMOOTH_STONE: 1
      STONE_BRICKS: 1
      NETHER_BRICKS: 2
      TERRACOTTA: 1
      HAY_BLOCK: 2
      SUGAR_CANE: 1
      CACTUS: 1
      KELP: 1

  weekly-goal:
    enabled: true
    target-blocks: 100000
    rewards:
      baseline-coins: 1000
      baseline-min-contribution: 250
      top-percent: 10
      top-percent-bonus-coins: 10000
      # Fixed coin payout for the top contributors (1st, 2nd, 3rd, …) when the
      # weekly goal completes — stacks on top of the baseline. Set to [] to disable.
      podium-coins: [100000, 50000, 25000]
    broadcast:
      milestones-percent: [25, 50, 75, 100]

  raids:
    enabled: false             # temporarily disabled — re-enable once the community boss flow is re-tuned
    interval-minutes: 120
    interval-jitter-percent: 20
    boss-id: random           # picks from BossManager registry
    despawn-after-minutes: 10
    scaling:
      base-multiplier: 2.5
      per-online-player: 0.10
      max-online-player-multiplier: 4.0
    rewards:
      base-coin-pool: 50000
      pool-per-online-player: 2500
      top-damage-drop: NETHER_STAR:1
      min-damage-fraction: 0.02

  coop:
    allow-open-visits: true
    members-advance-phase: true

# Prestige — unlocked after completing the final phase.
prestige:
  # Each prestige adds this fraction to the coin multiplier (0.10 = +10% per level).
  coin-multiplier-per-level: 0.10
  # Each prestige adds this fraction to the skill XP multiplier.
  xp-multiplier-per-level: 0.05
  # Each prestige adds this fraction to xEconomy sell prices (/sell, sell menu,
  # shop selling, and sell chests — boosted by the chest owner's prestige).
  # Capped at max-level like the other multipliers. Requires xEconomy 0.4.0+.
  sell-boost-per-level: 0.10
  # Multiplier stops scaling above this level; players can still prestige past it for the title.
  max-level: 10
  # Coin lump on each prestige is base * newLevel.
  base-coin-reward: 50000
  # Console commands fired on prestige. %player%, %level% and %level_capped%
  # (capped at max-level, for rewards that only exist up to prestige 10) are substituted.
  reward-commands:
    - "petadmin give %player% novablock_prestige_%level_capped%"
    - "swansonstocks give %player% 10"

# Weekly sprint. Two parallel boards reset Monday 00:00 server-local; the
# Sunday 20:00 podium broadcasts top 3 and dispatches the rewards below.
# Island progress is never touched — only the per-week counters reset.
sprint:
  hardcore:
    # Coins awarded to the top-3 islands (split among online members by xEconomy).
    coin-rewards: [100000, 50000, 25000]
    # Optional console commands fired per place. Placeholders: %owner% %place%.
    reward-commands-place-1: []
    reward-commands-place-2: []
    reward-commands-place-3: []
  casual:
    # Coins awarded to the top-3 players' islands.
    coin-rewards: [25000, 10000, 5000]
    # Optional console commands fired per place. Placeholders: %player% %place%.
    reward-commands-place-1: []
    reward-commands-place-2: []
    reward-commands-place-3: []

minions:
  tick-rate-ticks: 20
  default-island-limit: 6
  limit-per-prestige: 1
  max-prestige-limit-bonus: 6
  # Max community-claim minions per player (placed in the community world on an
  # xGuard claim you own). Per-player perm override: novablock.minions.community-limit.<n>.
  community-limit: 5
  discard-leftovers: false
  fuel:
    default-speed-multiplier: 1.35
  skins:
    royal: { default-unlocked: false }
    emerald: { default-unlocked: false }
    amethyst: { default-unlocked: false }
    frost: { default-unlocked: false }
    nether: { default-unlocked: false }
    void: { default-unlocked: false }
  shop-prices:
    plains_farmer: 1000
    underground_miner: 2500
    frozen_forager: 4000
    desert_digger: 6000
    reef_collector: 8500
    nether_harvester: 12000
    ancient_excavator: 17000
    lush_gardener: 23000
    stronghold_scholar: 30000
    end_salvager: 40000
    celestial_collector: 55000
    void_scavenger: 75000
  shop-enabled:
    plains_farmer: true
    underground_miner: true
    frozen_forager: true
    desert_digger: true
    reef_collector: true
    nether_harvester: true
    ancient_excavator: true
    lush_gardener: true
    stronghold_scholar: true
    end_salvager: true
    celestial_collector: true
    void_scavenger: true
  upgrade-costs:
    speed: { 1: 1000, 2: 4000, 3: 9000, 4: 16000, 5: 25000 }
    yield: { 1: 1250, 2: 5000, 3: 11250, 4: 20000, 5: 31250 }
    fuel-efficiency: { 1: 750, 2: 3000, 3: 6750, 4: 12000, 5: 18750 }
    compactor: { 1: 2500, 2: 5000, 3: 7500 }
  outputs:
    void_scavenger:
      - { material: SCULK, weight: 70, min: 1, max: 2 }
      - { material: ECHO_SHARD, weight: 40, min: 1, max: 1, rareChance: 0.10 }
      - { material: ENDER_PEARL, weight: 45, min: 1, max: 2 }
      - { material: OBSIDIAN, weight: 35, min: 1, max: 2 }
      - { material: NETHERITE_SCRAP, weight: 2, min: 1, max: 1, rareChance: 0.01 }

# ------------------------------------------------------------------
# Sidebar scoreboard (/sb)
# ------------------------------------------------------------------
# Leave 'lines' empty to keep the built-in dynamic board (phase, skills,
# coins, streak, rifts, community goal, etc.). Fill it in to override with
# your own layout. Apply changes live with /obadmin reload.
#
# Formatting:  MiniMessage  ->  <gold>, <gradient:#7B61FF:#4FC3F7>, <bold>, <white>
# Placeholders: any PlaceholderAPI placeholder (PlaceholderAPI is installed):
#   %player_name%               the player's name
#   %server_online%             online player count
#   %novablock_coins%           island coins
#   %novablock_phase_name%      current phase name
#   %novablock_phase_progress%  blocks into current phase
#   %novablock_phase_required%  blocks needed for the phase
#   %novablock_blocks%          total blocks broken
#   %novablock_prestige_title%  prestige title (blank if none)
#   %novablock_login_streak%    daily login streak
#   %novablock_path_tier%       seasonal path tier
#   %novablock_skill_mining_level%  (also combat / magic / luck)
#   ...plus any other plugin's placeholders, e.g. %vault_eco_balance%.
#
# A line that resolves to an EMPTY string is skipped — handy for conditional
# rows (e.g. a placeholder that returns "" when not applicable). A line of one
# or more spaces is kept as a blank spacer. Max 15 lines.
scoreboard:
  # Top title. Empty = built-in gradient title.
  title: ""
  community-title: ""
  # Personal-island board. Empty list = built-in dynamic board.
  lines: []
  # Shared Community OneBlock world board. Empty list = built-in board.
  community-lines: []
  # Example starting point — uncomment 'lines:' above-style and tweak:
  # lines:
  #   - "<gray>Phase: <aqua>%novablock_phase_name%"
  #   - "<gray>%novablock_phase_progress% / %novablock_phase_required% blocks"
  #   - "<gray>Total: <white>%novablock_blocks%"
  #   - "<gold>Coins: <yellow>%novablock_coins%"
  #   - " "
  #   - "<#7CFC00>Mining <white>Lv %novablock_skill_mining_level%"
  #   - "<#FF6B6B>Combat <white>Lv %novablock_skill_combat_level%"
  #   - "<#9C66FF>Magic <white>Lv %novablock_skill_magic_level%"
  #   - "<#FFD24D>Luck <white>Lv %novablock_skill_luck_level%"
  #   - "  "
  #   - "<gray>Online: <green>%server_online%"
