name: NovaBlock
version: ${project.version}
main: com.nova.novablock.NovaBlock
api-version: '26.1'
authors: [Nova]
description: A reimagined OneBlock experience with phases, bosses, loot rooms, skill trees, prophecies and more.
load: POSTWORLD
depend: [xEconomy]
softdepend: [floodgate, Geyser-Spigot, PlaceholderAPI, LuckPerms, xPets, xTags, OGOneBlock]

commands:
  oneblock:
    description: Main NovaBlock command
    usage: /<command> [create|delete|home [nether]|hub|fix|phase|menu|prophecy|skills|flags|storage|quests|leaderboard|path|atlas|pets|prestige|invite|accept|leave|visit|trust|untrust|toggle|setspawn|friend|minions|sprint|help]
    aliases: [ob, nb, novablock]
  obadmin:
    description: NovaBlock admin command
    usage: /<command> [reload|setphase|spawnboss|givecoins|event|wipe|hub|fix|givepaxel|flags|storage|menu|path|sprint|freshstart|setspawn]
    permission: novablock.admin
  sb:
    description: Toggle the NovaBlock sidebar scoreboard
    usage: /<command>
    aliases: [scoreboard, sidebar]
  backpack:
    description: Open your personal backpack, or 'toggle' the hotbar item + auto-grab
    usage: /<command> [toggle]
    aliases: [bp]
  novahelp:
    description: Open the NovaBlock help GUI
    usage: /<command>
    aliases: [obhelp, guide]
  spawn:
    description: Teleport to your personal spawn (falls back to the world spawn).
    usage: /<command>
  obminions:
    description: Open or manage NovaBlock minions
    usage: /<command> [overview|shop|help|types|reload|debug|give|list|removeall|outputs]
    aliases: [minions, minion, obminion]
  skill:
    description: Open the skills menu, or view a specific skill
    usage: /<command> [skill|help]
    permission: novablock.skills
    aliases: [skills, mcmmo]

permissions:
  novablock.play:
    description: Allows playing NovaBlock
    default: true
  novablock.spawn:
    description: Allows using /spawn.
    default: true
  novablock.setspawn:
    description: Allows using /ob setspawn to set your personal spawn.
    default: true
  novablock.friend:
    description: Allows using /ob friend (add/accept/deny/remove/list).
    default: true
  novablock.trust:
    description: Allows granting/revoking build access on your island via /ob trust and /ob untrust.
    default: true
  novablock.hub:
    description: Allows opening the community hub and teleport shortcut.
    default: true
  novablock.visit.bypass:
    description: Allows visiting islands regardless of their visit flags.
    default: op
  novablock.admin.setspawn:
    description: Allows /obadmin setspawn to set the server spawn.
    default: op
  novablock.create:
    description: Allows creating an island
    default: true
  novablock.delete:
    description: Allows the island owner to permanently delete their own island via /ob delete
    default: true
  novablock.home:
    description: Allows /ob home
    default: true
  novablock.fix:
    description: Allows repairing your missing OneBlock center.
    default: true
  novablock.menu:
    description: Allows opening the main menu
    default: true
  novablock.prophecy:
    description: Allows locking prophecies
    default: true
  novablock.skills:
    description: Allows viewing the skill tree
    default: true
  novablock.leaderboard:
    description: Allows viewing the leaderboard
    default: true
  novablock.toggle:
    description: Allows toggling the hotbar menu item and sidebar
    default: true
  novablock.flags:
    description: Allows opening the island flags GUI (toggling individual flags still requires per-flag perms)
    default: true
  novablock.storage:
    description: Allows opening the island's shared virtual storage
    default: op
  novablock.backpack:
    description: Allows opening your personal backpack (/backpack)
    default: true
  novablock.minions.use:
    description: Allows using NovaBlock minions. Dynamic limit nodes use novablock.minions.limit.<number>.
    default: true
  novablock.minions.buy:
    description: Allows buying NovaBlock minions
    default: true
  novablock.minions.admin:
    description: Allows administering NovaBlock minions
    default: op
  novablock.admin.minions:
    description: Allows admin minion commands
    default: op
  novablock.minions.skin.royal:
    description: Unlocks the Royal minion skin
    default: op
  novablock.minions.skin.emerald:
    description: Unlocks the Emerald minion skin
    default: op
  novablock.minions.skin.amethyst:
    description: Unlocks the Amethyst minion skin
    default: op
  novablock.minions.skin.frost:
    description: Unlocks the Frost minion skin
    default: op
  novablock.minions.skin.nether:
    description: Unlocks the Nether minion skin
    default: op
  novablock.minions.skin.void:
    description: Unlocks the Void minion skin
    default: op
  novablock.build.bypass:
    description: Allows building and breaking on any NovaBlock island
    default: op
  novablock.flag.natural_mob_spawning:
    description: Allows toggling the natural-mob-spawning flag
    default: op
  novablock.flag.creeper_block_damage:
    description: Allows toggling the creeper-block-damage flag
    default: op
  novablock.flag.tnt_block_damage:
    description: Allows toggling the TNT-block-damage flag
    default: op
  novablock.flag.mob_griefing:
    description: Allows toggling the mob-griefing flag
    default: op
  novablock.flag.fire_spread:
    description: Allows toggling the fire-spread flag
    default: op
  novablock.flag.pvp:
    description: Allows toggling the PVP flag
    default: op
  novablock.flag.visitor_build:
    description: Allows toggling the visitor-build flag
    default: op
  novablock.flag.open_visits:
    description: Allows toggling the open-visits flag
    default: true
  novablock.flag.island_fly:
    description: Allows toggling the island-fly flag
    default: op
  novablock.flag.keep_inventory:
    description: Allows toggling the keep-inventory flag
    default: op
  novablock.flag.always_day:
    description: Allows toggling the always-day flag
    default: op
  novablock.flag.no_hunger_drain:
    description: Allows toggling the no-hunger-drain flag
    default: op
  novablock.flag.phase_ambience:
    description: Allows toggling the phase-ambience flag
    default: op
  novablock.flag.nightmare_mode:
    description: Allows toggling Nightmare Mode (locked once enabled)
    default: op
  novablock.admin:
    description: All admin commands
    default: op
    children:
      novablock.admin.reload: true
      novablock.admin.setphase: true
      novablock.admin.spawnboss: true
      novablock.admin.givecoins: true
      novablock.admin.event: true
      novablock.admin.wipe: true
      novablock.admin.givepaxel: true
      novablock.admin.giveoneblock: true
      novablock.admin.giveminion: true
      novablock.admin.flags: true
      novablock.admin.storage: true
      novablock.admin.menu: true
      novablock.admin.path: true
      novablock.admin.sprint: true
      novablock.admin.hub: true
      novablock.admin.freshstart: true
      novablock.admin.fix: true
      novablock.admin.minions: true
      novablock.visit.bypass: true
